# Pronásledovatelé (v3) — perzistentní protivník runu. Losuje se 1 na začátku,
# viditelný od první minuty, NIKDY nestojí v běžném uzlu — jedná výhradně přes
# prahy Žáru (léčka → konfrontace; hodnoty prahů dle prototyp-mvp.md, nehardcodovat).
# Ruší JEDEN stat nebo štítek → čtvrtina páky je proti finále oslabená, každý run
# jiný. Žádná perzistence napříč runy. Žádní UGC pronásledovatelé.
#
# Schéma (nová pole nepřidávat bez úpravy komentáře):
#   id:     kebab-case, unikátní napříč obsah/
#   nazev:  jméno s titulem
#   rusi:   co proti němu nefunguje / je potrestáno. ROZSAH = RUN-WIDE (D20a):
#           pravidlo platí po CELÝ run, dokud je pronásledovatel aktivní — ne jen
#           v jeho léčce/konfrontaci. Je viditelné hráčům OD STARTU (proto se
#           telegrafy běžných situací kvůli němu nemění — hráč pravidlo zná).
#             typ:     stat | stitek
#             cil:     stat (utok/obrana/hodnota/improvizace/nastroj) nebo štítek (GANGSTER)
#             pravidlo: přesné znění efektu, viditelné hráčům
#   flavor: 1 věta pro protokol — polda ho zná osobně
#   lecka:       slotová situace pro práh léčky (typ lecka)
#   konfrontace: slotová situace pro práh konfrontace (typ konfrontace); finále,
#                nejtvrdší pásma-postihy. Přežití srazí Žár (viz prototyp-mvp.md).
# lecka/konfrontace mají STEJNÉ schéma slotů jako obsah/situace.yaml (telegraf +
# QA invariant, text se 4 {VEC}, 4 sloty s kotvou 2–4, pasmove_vysledky). Žijí
# ZDE (vázané na pronásledovatele), ne v poolu 14 uzlů.
# GANGSTER per typ situace (lecka = jako npc: viditelná role selže / skrytá eso;
# konfrontace = vzdy_pass: zbraň projde) je STROJOVĚ v obsah/stitky.yaml
# (chovani_dle_typu) — to je zdroj pravdy; zde jen připomínka v próze telegrafů.
# Cílový počet pro MVP: 2.

pronasledovatele:
  - id: agent-malone
    nazev: Federální agent Malone
    rusi:
      typ: stat
      cil: hodnota
      pravidlo: "Malone je neúplatný a hráči to vědí od startu: dokud je Malone aktivní pronásledovatel, počítá se stat HODNOTA u všech věcí jako 0 ve VŠECH hodnota-slotech CELÉHO runu (ne jen v jeho léčce a konfrontaci). Úplatky na něj ani na nikoho po trase neplatí."
    flavor: "Vyšetřovatel poznamenává, že agent Malone nepije, nekouří a nebere. Nikdo na okrsku nechápe, co tu tedy dělá."
    lecka:
      typ: lecka
      svet: 1930
      telegraf: "Malone obsadil most u Poughkeepsie a drží vaši fotografii. Tři viditelné role chtějí zapřít totožnost, pevné nervy a objet ho stranou; jedna skrytá čeká na nejhorší. Peníze na něj neplatí — a zbraň projde leda potají."
      text: >
        U závory stál Malone a porovnával tváře s fotografií. {kdo} zapřel totožnost
        pomocí {VEC}, {kdo} nedal na sobě znát strach za {VEC} a {kdo} navedl vůz kolem
        něj s {VEC}. Kdyby federál sáhl po zbrani, měl {kdo} připravené {VEC}.
      sloty:
        - { role: "Zapřít totožnost",   stat: improvizace, kotva: 3, viditelnost: viditelna }
        - { role: "Nedat na sobě znát", stat: obrana,      kotva: 3, viditelnost: viditelna }
        - { role: "Objet ho stranou",   stat: nastroj,     kotva: 3, viditelnost: viditelna }
        - { role: "Kdyby sáhl po zbrani", stat: utok,      kotva: 3, viditelnost: skryta }
      pasmove_vysledky:
        hladce_loot: { loot: karta }
        s_nasledky:  { postih_lehky: [mlha-v-hlave, prilis-na-rane, nervy-v-hajzlu] }
        prusvih:     { postih_tezky: [rozdrcena-noha] }
    konfrontace:
      typ: konfrontace
      svet: 1930
      telegraf: "Kolona federálních vozů vás sevřela a Malone si bez spěchu nasazuje brýle. Tři viditelné role jsou o průraz silou, ustát salvu a strhnout vůz do pole; jedna skrytá kryje záda. Tady zbraň konečně mluví — na očích i potají."
      text: >
        Federální vozy zatarasily silnici z obou stran a Malone vystoupil. {kdo} se
        pokusil probít ven s {VEC}, {kdo} ustál první salvu za {VEC} a {kdo} strhl vůz
        do pole pomocí {VEC}. Záda přitom kryl {kdo} s {VEC}.
      sloty:
        - { role: "Probít se ven",  stat: utok,        kotva: 4, viditelnost: viditelna }
        - { role: "Ustát salvu",    stat: obrana,      kotva: 3, viditelnost: viditelna }
        - { role: "Strhnout do pole", stat: improvizace, kotva: 3, viditelnost: viditelna }
        - { role: "Krýt záda",      stat: utok,        kotva: 3, viditelnost: skryta }
      pasmove_vysledky:
        hladce_loot: { loot: karta }
        s_nasledky:  { postih_lehky: [narazene-rameno, zvoneni-v-usich, utrzena-kapsa] }
        prusvih:     { postih_tezky: [ochrnuta-ruka, otras-mozku] }

  - id: serif-brody
    nazev: Okresní šerif Brody
    rusi:
      typ: stitek
      cil: GANGSTER
      pravidlo: "Násilí Brodyho přitahuje a hráči to vědí od startu: dokud je Brody aktivní pronásledovatel, přidává každá věc se štítkem GANGSTER +2 Žár místo +1 v CELÉM runu (run-wide, ne jen v jeho léčce a konfrontaci)."
    flavor: "Vyšetřovatel uvádí, že šerif Brody řeší okresní záležitosti tradičně: nejprve střelbou, poté dotazy."
    lecka:
      typ: lecka
      svet: 1930
      telegraf: "Brody s partou nadšených občanů přehradil silnici valníkem a nasadil služební úsměv. Tři viditelné role chtějí uklidnit dav, přimazat dlaň a kamennou tvář; jedna skrytá pro nejhorší. Zbraň projde jen potají — a u Brodyho přitáhne dvojnásob pozornosti."
      text: >
        Brody stál před valníkem obklopen zvědavci a culil se. {kdo} uklidňoval dav
        pomocí {VEC}, {kdo} přimazal šerifovi dlaň {VEC} a {kdo} držel kamennou tvář
        za {VEC}. Kdyby padl výstřel, měl {kdo} po ruce {VEC}.
      sloty:
        - { role: "Uklidnit dav",     stat: improvizace, kotva: 3, viditelnost: viditelna }
        - { role: "Přimazat dlaň",    stat: hodnota,     kotva: 3, viditelnost: viditelna }
        - { role: "Kamenná tvář",     stat: obrana,      kotva: 2, viditelnost: viditelna }
        - { role: "Kdyby padl výstřel", stat: utok,      kotva: 3, viditelnost: skryta }
      pasmove_vysledky:
        hladce_loot: { loot: karta }
        s_nasledky:  { postih_lehky: [drobna-pokuta, vysypana-bedna, utrzena-kapsa] }
        prusvih:     { postih_tezky: [zlomene-zebro] }
    konfrontace:
      typ: konfrontace
      svet: 1930
      telegraf: "Brodyho muži vás zahnali k zavřenému mostu a šerif si sundává klobouk. Tři viditelné role jsou o průraz silou, najít kudy ujet a kličkovat; jedna skrytá vydrží nápor. Tady zbraň mluví, ale u Brodyho každý výstřel přitáhne olovo dvojnásob."
      text: >
        Most byl zavřený a Brodyho muži se hrnuli zezadu. {kdo} se probíjel vpřed
        s {VEC}, {kdo} hledal, kudy ujet, pomocí {VEC} a {kdo} kličkoval mezi vozy
        za {VEC}. Nápor přitom vydržel {kdo} díky {VEC}.
      sloty:
        - { role: "Probít se vpřed", stat: utok,        kotva: 4, viditelnost: viditelna }
        - { role: "Najít, kudy ujet", stat: nastroj,    kotva: 3, viditelnost: viditelna }
        - { role: "Kličkovat mezi vozy", stat: improvizace, kotva: 3, viditelnost: viditelna }
        - { role: "Vydržet nápor",   stat: obrana,      kotva: 3, viditelnost: skryta }
      pasmove_vysledky:
        hladce_loot: { loot: karta }
        s_nasledky:  { postih_lehky: [narazene-rameno, zvoneni-v-usich, nervy-v-hajzlu] }
        prusvih:     { postih_tezky: [zlomene-zebro, otras-mozku] }
