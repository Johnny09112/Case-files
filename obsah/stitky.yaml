# Štítky — vzácné značky na věcech s TVRDÝM pravidlem (ne číslem). Nad staty.
# Registr drží jen PARAMETRY štítku; samotné pravidlo implementuje engine v kódu
# (D19: žádný obecný rule-DSL v obsahu). Slot může parametr přebít výjimkou
# `stitek_citlivy` (viz obsah/situace.yaml).
#
# Schéma:
#   id:        VELKÝMI, unikátní; shoduje se s hodnotou pole `stitek` u věcí
#   nazev:     lidský název
#   parametry: mapa pojmenovaných přepínačů, které engine čte (viz komentář níže)
# Cílový počet pro MVP: 1 (GANGSTER).

stitky:
  - id: GANGSTER
    nazev: Gangster
    # Parametry (engine implementuje chování; TOTO je strojový ZDROJ PRAVDY —
    # próza telegrafů a komentáře v pronasledovatele.yaml jen vysvětlují, nerozhodují).
    #   chovani_dle_typu: pro každý typ situace určuje chování GANGSTER věci ve slotu.
    #     Hodnoty (enum):
    #       viditelna_role_selze = ve slotu viditelnost=viditelna věc AUTO-FAIL bez
    #           ohledu na staty; ve slotu viditelnost=skryta se štítek IGNORUJE a
    #           věc se hodnotí normálně dle statu (zbraň je eso).
    #       vzdy_pass = štítek se ignoruje bez ohledu na viditelnost slotu (nikdo
    #           zbraň neřeší; hodnotí se normálně dle statu).
    #     Slotová výjimka `stitek_citlivy: GANGSTER` (viz situace.yaml) přebíjí toto
    #     chování pro daný slot (např. eso i ve viditelné roli).
    #   hlucnost_zar: kolik Žáru přidá GANGSTER věc přiřazená do slotu. SWEEP tempa
    #     Žáru (prototyp-mvp.md §Žár). Pronásledovatel Brody tuto hodnotu run-wide
    #     ZDVOJNÁSOBUJE (viz pronasledovatele.yaml).
    parametry:
      chovani_dle_typu:
        npc:         viditelna_role_selze
        lecka:       viditelna_role_selze
        lokace:      vzdy_pass
        zatah:       vzdy_pass
        konfrontace: vzdy_pass
      hlucnost_zar: 1
