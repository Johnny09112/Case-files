# Věci — karty s pěti staty. Strojově čitelný zdroj pravdy, prototyp načítá přímo.
# Model resoluce v3 (slotový): věc se přiřadí do slotu, engine porovná JEDEN stat
# slotu se skrytým prahem (kotva ± šum). Viz prototyp-mvp.md §"Resoluční systém v3".
#
# Schéma (nová pole nepřidávat bez úpravy tohoto komentáře):
#   id:        kebab-case, unikátní NAPŘÍČ všemi soubory v obsah/
#   nazev:     max 3 slova
#   staty:     mapa přesně 5 statů, každý celé číslo 0–5:
#                utok / obrana / hodnota / improvizace / nastroj
#   stitek:    (volitelné) VELKÝMI z registru obsah/stitky.yaml; tvrdé pravidlo,
#              ne číslo. MVP jediný štítek: GANGSTER.
#   svet:      sdilena (default) | 1930 | ... — příslušnost; většina věcí sdílená
#   premiova:  bool, default false. MVP VŽDY false. (post-MVP: prémiové věci =
#              osobní loadout hráče, bere si ~2 ze své sbírky do startovní ruky —
#              per hráč, NEŘEDÍ sdílený balík; UI hvězdička.)
#   text:      max ~140 znaků, česky, dobová stylizace 1930, suchý situační humor
#   poznamka:  (volitelné) pro designéry, do hry nejde
#
# Model lízání (D19c): jeden SDÍLENÝ standardní balík (~40 věcí). Odhozené věci
# jdou na odhazovací hromádku; při vyčerpání balíku se hromádka zamíchá zpět
# (reshuffle). Líznutá věc patří tomu, kdo lízal. Custom karty ostatních hráčů
# nesytí tento balík — jdou do truhel přes globální fond (post-MVP).
#
# DISTRIBUCE STATŮ (invariant kvality): každá věc má PROFIL, ne plochý blok —
# 1–2 dominantní staty (3–5), zbytek nízký (0–2). Součet cca 6–11 (specializace,
# ne síla; §7 design). Filler věci klidně 5–6. Žádná věc není globálně silná.
# Pokrytí: ~7–9 dominantních věcí na každý z 5 statů, aby žádný slot neměl mrtvý
# fond. GANGSTER hustota: 5/40 — SWEEP PARAMETR brány (rozpětí 4–6), lze doladit.
# Cílový počet pro MVP: ~40.

