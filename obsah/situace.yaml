# Situace — resoluční uzly se 4 sloty. AUTORSKÝ text (AI nepíše, nerozhoduje).
# Tým committne přesně 4 karty naslepo dle telegrafu, po odhalení textu je rozdělí
# do 4 slotů co nejméně špatně. Každý slot: 1 stat vs. skrytý práh (kotva ± šum
# enginu). Viz prototyp-mvp.md §"Resoluční systém v3" a design-dokument §4.
#
# Schéma (nová pole nepřidávat bez úpravy komentáře):
#   id:        kebab-case, unikátní napříč obsah/
#   typ:       npc | lokace | zatah | lecka | konfrontace
#              (lecka/konfrontace se autorují u pronásledovatelů, ne zde)
#   svet:      1930 (default) | ...
#   telegraf:  1–2 věty PŘED commitem (viz QA invariant níže)
#   text:      max ~5 vět; obsahuje přesně 4 mezery {VEC} + volně {kdo}.
#              Mezery {VEC} se plní názvy zahraných věcí V POŘADÍ slotů níže.
#   sloty:     přesně 4×:
#     - role:        krátký název role (co se v té mezeře děje)
#       stat:        1 z 5 statů | [stat, stat] = KOMBI (obě věci? ne — JEDNA věc,
#                    jejíž OBA uvedené staty musí být ≥ kotva; D19b, střídmě,
#                    nízká kotva 2–3 — 3 od kalibrace-1 2026-07-24)
#       kotva:       2–4 (práh 0 zakázán); engine přičte šum ±1 při odhalení
#       viditelnost: viditelna | skryta   (ikona při odhalení)
#       stitek_citlivy: (volitelné VÝJIMKA) VELKÝMI — přebíjí parametr štítku pro
#                    tento slot (např. GANGSTER = eso i ve viditelné roli)
#   pasmove_vysledky:  situace autoruje JEN postih-pool per pásmo a případný loot.
#                      Kredity / Žár / ztráta nákladu jsou GLOBÁLNÍ dle pásma
#                      (prototyp-mvp.md) — situace je NEuvádí (D19, nález D3 kritika).
#     hladce_loot: { loot: karta }         # 4/4 — obsah lootu (karta = líznutí navíc)
#     # 3/4 HLADCE: bez postihu, nic se neautoruje
#     s_nasledky:  { postih_lehky: [<id>, ...] }   # 2/4 — engine vybere 1
#     prusvih:     { postih_tezky: [<id>, ...] }    # ≤1/4 — engine vybere 1
#   event:  (volitelné, jen část lokací) 3 flavor odbočky; engine losuje 1 ze 3.
#           SIM-INERTNÍ — čistá příchuť BEZ mechanického efektu (D19).
#
# QA INVARIANT TELEGRAFU (D19 + D6): telegraf je PRÓZA = lidský rendering signálu,
# který engine DERIVUJE ze slotů. Musí věrně sdělit: (1) TREND — zmiň VŠECHNY
# VIDITELNÉ staty slotů (ne jen 2 ze 3), aby informační věrnost byla vyrovnaná
# napříč situacemi; (2) POČET skrytých slotů ("proti srsti"); (3) ZBRAŇ
# projde/neprojde — plyne z typu situace a viditelnosti slotů (npc/lecka +
# viditelná role = GANGSTER selže; skrytá role, lokace, zatah, konfrontace =
# projde; zdroj pravdy obsah/stitky.yaml). NIC VÍC (neprozrazuj kotvy/prahy),
# NIC MÍŇ. Telegraf_signal se NEautoruje — derivuje ho engine; próza jen musí
# zůstat věrná (fidelita = sweep knob brány).
#
# Cílový počet pro MVP: 7 témat × 2 varianty = 14 + 1 speciální Zátah.

situace:
  # ============================================================
  # TÉMA 1 — Farmář
  # ============================================================
  - id: farmar-brod
    typ: npc
    svet: 1930
    telegraf: "Vůz trčí v brodě a farmář s vidlemi nemá dobrý den. Tři viditelné role chtějí zaplatit, klidné slovo a pár šikovných rukou u postroje; jedna skrytá čeká na nejhorší. Zbraň na očích ho jen popudí — projde leda potají."
    text: >
      Kola zapadla doprostřed brodu a na břehu už čeká farmář s vidlemi. {kdo} mu
      nabídl {VEC} za vytažení, {kdo} držel hlas mírný pomocí {VEC} a {kdo} zapřáhl
      koně s {VEC}. Kdyby chlap začal vyvádět, měl {kdo} po ruce {VEC}.
    sloty:
      - { role: "Zaplatit za vytažení", stat: hodnota, kotva: 4, viditelnost: viditelna }
      - { role: "Nezvednout hlas",      stat: obrana,  kotva: 3, viditelnost: viditelna }
      - { role: "Zapřáhnout a táhnout", stat: nastroj, kotva: 3, viditelnost: viditelna }
      - { role: "Kdyby začal vyvádět",  stat: utok,    kotva: 3, viditelnost: skryta }
    pasmove_vysledky:
      hladce_loot: { loot: karta }
      s_nasledky:  { postih_lehky: [drobna-pokuta, vysypana-bedna, roztresene-ruce] }
      prusvih:     { postih_tezky: [zlomene-zebro] }

  - id: farmar-stodola
    typ: lokace
    svet: 1930
    telegraf: "Statkář vás nechá přespat ve stodole, ale jeho psi hlídají líp než on. Tři viditelné role chtějí důvtip a šikovné ruce (u jedné obojí naráz); jedna skrytá je o pevné nervy. Tady vás nikdo nešpehuje, i zbraň projde."
    text: >
      Ve stodole to páchne senem a psi u vrat nespí. {kdo} tišil smečku pomocí
      {VEC}, {kdo} zaklínil vrata {VEC} a {kdo} zahrabal bednu do sena s {VEC}.
      Když statkář obcházel s lucernou, {kdo} ani nedýchal za {VEC}.
    sloty:
      - { role: "Utišit psy",            stat: improvizace,           kotva: 4, viditelnost: viditelna }
      - { role: "Zaklínit vrata",        stat: [nastroj, improvizace], kotva: 3, viditelnost: viditelna }
      - { role: "Schovat bednu do sena", stat: nastroj,               kotva: 4, viditelnost: viditelna }
      - { role: "Nedýchat, když jde kolem", stat: obrana,             kotva: 2, viditelnost: skryta }
    event:
      - "Ve vedlejším stání funí prasata a pod korytem leží zapomenutá bedna cizí kořalky."
      - "Statkářova dcera vás z okna pozoruje, ale mlčí — zatím."
      - "Na trámu visí puška po dědovi. Nabitá."
    pasmove_vysledky:
      hladce_loot: { loot: karta }
      s_nasledky:  { postih_lehky: [prach-do-oci, mlha-v-hlave, nervy-v-hajzlu] }
      prusvih:     { postih_tezky: [rozdrcena-noha] }

  # ============================================================
  # TÉMA 2 — Venkovský strážník
  # ============================================================
  - id: deputy-mytnice
    typ: npc
    svet: 1930
    telegraf: "U boudy natahuje zástupce šerifa ruku po 'silničním poplatku'. Tři viditelné role chtějí peníze, hladké řeči a klidnou tvář; jedna skrytá čeká, kdyby došlo na pěsti. Zbraň před ním schovej, na světle neprojde."
    text: >
      Zpoza závory vystoupil zástupce šerifa a poklepal na blok pokut. {kdo} mu
      vtiskl do dlaně {VEC}, {kdo} odvedl řeč stranou pomocí {VEC} a {kdo} u toho
      držel kamennou tvář za {VEC}. Kdyby přituhlo, čekala pod plachtou {VEC}.
    sloty:
      - { role: "Silniční poplatek",  stat: hodnota,     kotva: 3, viditelnost: viditelna }
      - { role: "Zamluvit to",        stat: improvizace, kotva: 4, viditelnost: viditelna }
      - { role: "Klidná tvář",        stat: obrana,      kotva: 2, viditelnost: viditelna }
      - { role: "Kdyby přituhlo",     stat: utok,        kotva: 3, viditelnost: skryta }
    pasmove_vysledky:
      hladce_loot: { loot: karta }
      s_nasledky:  { postih_lehky: [drobna-pokuta, vysypana-bedna, nervy-v-hajzlu] }
      prusvih:     { postih_tezky: [zlomene-zebro] }

  - id: deputy-hlidka
    typ: npc
    svet: 1930
    telegraf: "Postarší strážník přehradil cestu a leští si odznak, o to raděj sahá po revolveru. Tři viditelné role chtějí klid, něco na přilepšenou a šikovné ruce; jedna skrytá je pro tvrdé řešení. Zbraň jen potají."
    text: >
      Strážník postavil vůz napříč a založil ruce. {kdo} udržel nervy na uzdě za
      {VEC}, {kdo} mu strčil něco na přilepšenou v podobě {VEC} a {kdo} spravil,
      co bylo třeba, s {VEC}. Kdyby vytáhl bouchačku první, měl {kdo} po ruce {VEC}.
    sloty:
      - { role: "Nedat na sobě znát", stat: obrana,  kotva: 4, viditelnost: viditelna }
      - { role: "Na přilepšenou",     stat: hodnota, kotva: 3, viditelnost: viditelna }
      - { role: "Spravit, co třeba",  stat: nastroj, kotva: 4, viditelnost: viditelna }
      - { role: "Kdyby tasil první",  stat: utok,    kotva: 3, viditelnost: skryta }
    pasmove_vysledky:
      hladce_loot: { loot: karta }
      s_nasledky:  { postih_lehky: [narazene-rameno, zvoneni-v-usich, roztresene-ruce] }
      prusvih:     { postih_tezky: [zlomene-zebro] }

  # ============================================================
  # TÉMA 3 — Přechod přes řeku
  # ============================================================
  - id: most-prohnila-prkna
    typ: lokace
    svet: 1930
    telegraf: "Most přes řeku vrže prohnilými prkny a přehrazuje ho stará závora. Tři viditelné role volají po nářadí a šikovnosti (u jedné obojí zároveň); jedna skrytá se pozná, až bude pozdě couvnout. Zbraně se tu nikdo nelekne."
    text: >
      Před vozem se táhl most jak vytlučené zuby. {kdo} zvedal závoru {VEC}, {kdo}
      zpevňoval prkna {VEC} a {kdo} navedl kola přes díru s {VEC}. A {kdo} se
      snažil nedat na sobě znát, jak tenký led to je, pomocí {VEC}.
    sloty:
      - { role: "Zvednout závoru", stat: nastroj,                kotva: 3, viditelnost: viditelna }
      - { role: "Zpevnit prkna",   stat: [nastroj, improvizace], kotva: 2, viditelnost: viditelna }
      - { role: "Projet dírou",    stat: improvizace,            kotva: 3, viditelnost: viditelna }
      - { role: "Nedat to na sobě", stat: obrana,                kotva: 2, viditelnost: skryta }
    event:
      - "Pod mostem chrápe tramp a za doutník ohlídá vůz."
      - "V polovině mostu leží převrácený vůz konkurence — a plná bedna v příkopu."
      - "Mýtný má výběrčí knihu a zapisuje každou espézetku. I tu vaši."
    pasmove_vysledky:
      hladce_loot: { loot: karta }
      s_nasledky:  { postih_lehky: [vysypana-bedna, prilis-na-rane, prach-do-oci] }
      prusvih:     { postih_tezky: [rozdrcena-noha] }

  - id: privoz-celnik
    typ: npc
    svet: 1930
    telegraf: "Převozník vás veze na druhý břeh, jenže celník na palubě čichá ke každé bedně. Tři viditelné role chtějí důvtip, přesun z očí a peníze do dlaně; jedna skrytá řeší, kdyby čich zabral. Zbraň drž z dohledu."
    text: >
      Prám se odrazil od břehu a celník obcházel náklad s nosem u plachty. {kdo}
      mu zamotal hlavu pomocí {VEC}, {kdo} přesunul náklad z očí do {VEC} a {kdo}
      mu nenápadně přilepšil {VEC}. Kdyby přeci jen čenichal dál, čekala {VEC}.
    sloty:
      - { role: "Zamotat hlavu",      stat: improvizace, kotva: 4, viditelnost: viditelna }
      - { role: "Přesunout z očí",    stat: nastroj,     kotva: 4, viditelnost: viditelna }
      - { role: "Přilepšit do dlaně", stat: hodnota,     kotva: 3, viditelnost: viditelna }
      - { role: "Kdyby čenichal dál", stat: utok,        kotva: 3, viditelnost: skryta }
    pasmove_vysledky:
      hladce_loot: { loot: karta }
      s_nasledky:  { postih_lehky: [prach-do-oci, vysypana-bedna, mlha-v-hlave] }
      prusvih:     { postih_tezky: [ochrnuta-ruka] }

  # ============================================================
  # TÉMA 4 — Rivalský gang
  # ============================================================
  - id: rival-prepad
    typ: npc
    svet: 1930
    telegraf: "Konkurenční parta zablokovala cestu a chce náklad. Tři viditelné role jsou o síle, pevných nervech a mrštnosti; jedna skrytá patří tomu, kdo tasí včas. Zbraň projde jen skrytě a jako první — vytažená na očích tě potopí."
    text: >
      Napříč silnicí stály vozy rivalů a chlapi si plivali do dlaní. {kdo} se jim
      postavil s {VEC}, {kdo} ustál první nápor za {VEC} a {kdo} se pokusil
      vyklouznout stranou s {VEC}. Než se kdo nadál, měl {kdo} v ruce {VEC}.
    sloty:
      - { role: "Postavit se jim",  stat: utok,        kotva: 4, viditelnost: viditelna }
      - { role: "Ustát nápor",      stat: obrana,      kotva: 4, viditelnost: viditelna }
      - { role: "Vyklouznout stranou", stat: improvizace, kotva: 4, viditelnost: viditelna }
      - { role: "Tasit včas a první", stat: utok,       kotva: 3, viditelnost: skryta }
    pasmove_vysledky:
      hladce_loot: { loot: karta }
      s_nasledky:  { postih_lehky: [narazene-rameno, zvoneni-v-usich, utrzena-kapsa] }
      prusvih:     { postih_tezky: [ochrnuta-ruka, otras-mozku] }

  - id: rival-parley
    typ: npc
    svet: 1930
    telegraf: "Bootleggerský boss vás zve k jednání nad sklenkou, za zády tři chlapi. Tři viditelné role chtějí peníze na stůl, uhlazenou řeč a chladnou hlavu; jedna skrytá čeká, kdyby úsměv zmizel. Zbraň na stole neprojde, pod stolem ano."
    text: >
      Boss nalil a pokynul k židli, za jeho zády tři stíny. {kdo} položil na stůl
      {VEC}, {kdo} držel řeč uhlazenou pomocí {VEC} a {kdo} se nedal zastrašit za
      {VEC}. Kdyby úsměv zmizel, měl {kdo} pod stolem {VEC}.
    sloty:
      - { role: "Peníze na stůl",   stat: hodnota,     kotva: 4, viditelnost: viditelna }
      - { role: "Uhlazená řeč",     stat: improvizace, kotva: 4, viditelnost: viditelna }
      - { role: "Nedat se zastrašit", stat: obrana,    kotva: 3, viditelnost: viditelna }
      - { role: "Kdyby úsměv zmizel", stat: utok,      kotva: 3, viditelnost: skryta }
    pasmove_vysledky:
      hladce_loot: { loot: karta }
      s_nasledky:  { postih_lehky: [roztresene-ruce, nervy-v-hajzlu, utrzena-kapsa] }
      prusvih:     { postih_tezky: [zlomene-zebro] }

  # ============================================================
  # TÉMA 5 — Úředník / celnice
  # ============================================================
  - id: urednik-vaha
    typ: npc
    svet: 1930
    telegraf: "U váhy sedí úředník s knírkem a hromadou předpisů, brát nesmí a sledují ho shora. Tři viditelné role chtějí papíry, správné nářadí a když nezbude, zvýšený hlas; jedna skrytá drží nervy. Papír tu zmůže víc než olovo — na očích úředníka jen popudí, schovaná nezmůže nic."
    text: >
      Úředník naklepal razítko a založil si brýle. {kdo} mu podstrčil {VEC}, {kdo}
      doložil chybějící razítko pomocí {VEC} a {kdo} zvýšil hlas s {VEC}. Celou
      dobu {kdo} držel kamennou tvář za {VEC}.
    sloty:
      - { role: "Podstrčit papíry",  stat: improvizace, kotva: 4, viditelnost: viditelna }
      - { role: "Doložit razítko",   stat: nastroj,     kotva: 4, viditelnost: viditelna }
      - { role: "Zvýšit hlas",       stat: utok,        kotva: 4, viditelnost: viditelna }
      - { role: "Nedat se rozhodit", stat: obrana,      kotva: 2, viditelnost: skryta }
    pasmove_vysledky:
      hladce_loot: { loot: karta }
      s_nasledky:  { postih_lehky: [drobna-pokuta, mlha-v-hlave, roztresene-ruce] }
      prusvih:     { postih_tezky: [rozdrcena-noha] }

  - id: urednik-razitko
    typ: npc
    svet: 1930
    telegraf: "Na celnici chybí jediné razítko a úředník je úzkostlivě poctivý. Tři viditelné role chtějí věrohodný list, dorazit razítko a něco navíc do dlaně; jedna skrytá je o pevné nervy. Papír tu zmůže víc než dolar — a olovo tady nepořídí nic, ať u pasu nebo v ruce."
    text: >
      Za přepážkou přebíral úředník listiny a mračil se na prázdné políčko. {kdo}
      mu předložil věrohodný list pomocí {VEC}, {kdo} dorazil chybějící razítko
      s {VEC} a {kdo} nabídl něco navíc v podobě {VEC}. {kdo} přitom ani nemrkl za {VEC}.
    sloty:
      - { role: "Věrohodný list",   stat: improvizace, kotva: 4, viditelnost: viditelna }
      - { role: "Dorazit razítko",  stat: nastroj,     kotva: 4, viditelnost: viditelna }
      - { role: "Něco navíc",       stat: hodnota,     kotva: 3, viditelnost: viditelna }
      - { role: "Ani nemrknout",    stat: obrana,      kotva: 2, viditelnost: skryta }
    pasmove_vysledky:
      hladce_loot: { loot: karta }
      s_nasledky:  { postih_lehky: [drobna-pokuta, prach-do-oci, roztresene-ruce] }
      prusvih:     { postih_tezky: [otras-mozku] }

  # ============================================================
  # TÉMA 6 — Městská policie
  # ============================================================
  - id: mesto-houkacky
    typ: lokace
    svet: 1930
    telegraf: "Ulicemi houkají hlídkové vozy, velká policejní akce. Tři viditelné role chtějí důvtip a rychlé řízení, abys splynul a zmizel; jedna skrytá je o klid v návalu. V té tlačenici zbraň nikdo neřeší."
    text: >
      Sirény houkaly ze všech ulic a chodník byl k prasknutí. {kdo} splynul s davem
      pomocí {VEC}, {kdo} zajel do postranní s {VEC} a {kdo} zahodil stopu za {VEC}.
      V tom náporu {kdo} udržel klid jen díky {VEC}.
    sloty:
      - { role: "Splynout s davem",   stat: improvizace, kotva: 3, viditelnost: viditelna }
      - { role: "Zajet do postranní", stat: nastroj,     kotva: 4, viditelnost: viditelna }
      - { role: "Zahodit stopu",      stat: improvizace, kotva: 3, viditelnost: viditelna }
      - { role: "Klid v návalu",      stat: obrana,      kotva: 2, viditelnost: skryta }
    event:
      - "Z hlídkového vozu vypadl zapomenutý svazek policejních klíčů."
      - "Novinář s bleskem vás vyfotil. Snímek zítra vyjde — s vaší espézetkou."
      - "Podloudník na rohu vám za dolar prodá zadní vchod z bloku."
    pasmove_vysledky:
      hladce_loot: { loot: karta }
      s_nasledky:  { postih_lehky: [mlha-v-hlave, prilis-na-rane, prach-do-oci] }
      prusvih:     { postih_tezky: [rozdrcena-noha] }

  - id: mesto-ulicka
    typ: npc
    svet: 1930
    telegraf: "Dva městští policisté vás zahnali do slepé uličky a znají tu každý kanál. Tři viditelné role chtějí klid, řeč a v nouzi výhružné gesto; jedna skrytá hledá skulinu. Zbraň na očích neprojde, skulina se najde jen potají."
    text: >
      Ulička končila zdí a dva strážníci ji zatarasili. {kdo} držel nervy pevně za
      {VEC}, {kdo} je zkoušel zamluvit pomocí {VEC} a {kdo} zvedl ruku s {VEC}.
      Zatímco mluvili, {kdo} nahmatal skulinu skrz {VEC}.
    sloty:
      - { role: "Držet nervy",     stat: obrana,      kotva: 4, viditelnost: viditelna }
      - { role: "Zamluvit to",     stat: improvizace, kotva: 4, viditelnost: viditelna }
      - { role: "Zastrašit gestem", stat: utok,       kotva: 4, viditelnost: viditelna }
      - { role: "Najít skulinu",   stat: nastroj,     kotva: 2, viditelnost: skryta }
    pasmove_vysledky:
      hladce_loot: { loot: karta }
      s_nasledky:  { postih_lehky: [prilis-na-rane, nervy-v-hajzlu, utrzena-kapsa] }
      prusvih:     { postih_tezky: [rozdrcena-noha] }

  # ============================================================
  # TÉMA 7 — Nádraží / překladiště
  # ============================================================
  - id: nadrazi-vypravci
