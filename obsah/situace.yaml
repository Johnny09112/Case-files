  - id: nadrazi-noc
    typ: lokace
    svet: 1930
    telegraf: "V noci se protahujete kolem hlídače s lucernou k odstavenému vagonu. Ve tmě se dobře mizí — dvě role o důvtipu a nářadí; dvě skryté hlídají klid a záložní řešení. Mezi vagony zbraň nikoho nevyplaší."
    text: >
      Mezi odstavenými vagony se míhalo světlo hlídačovy lucerny. {kdo} proklouzl
      kolem něj pomocí {VEC}, {kdo} páčil dveře vagonu {VEC} a {kdo} ztuhl ve stínu
      za {VEC}. Kdyby se hlídač probudil, měl {kdo} připravené {VEC}.
