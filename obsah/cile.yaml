# Tajné osobní cíle — lízne si každý hráč na začátku runu, odhalují se na konci.
# Schéma (nová pole nepřidávat bez úpravy tohoto komentáře):
#   id:          kebab-case, unikátní
#   text:        co musí stát v protokolu (zobrazí se hráči jako jeho tajný cíl)
#   overeni:     lidský popis, jak se na konci pozná splnění (pro poldu/hru, hráčům
#                se nečte). VŽDY přítomen — u textových cílů je to jediné ověření.
#   overeni_typ: mechanicky | textovy — POVINNÉ, řídí, kdo cíl umí obodovat:
#      mechanicky = simulátor cíl obodovat z událostního logu enginu (viz
#                   technika/architektura.md §2.2, §3). MUSÍ mít pole `podminka`.
#      textovy    = splnění pozná až člověk z obsahu protokolu (např. jak tě polda
#                   pojmenuje). Simulátor takový cíl z metrik VYNECHÁ (nemá ho jak
#                   ověřit) — pole `podminka` nemá.
#   podminka:    (jen u overeni_typ: mechanicky; jinak vynech) strojově čitelná
#                podmínka nad metrikami odvozenými z událostního logu, vyhodnocená
#                pro postavu vlastníka na konci runu. Ukotvení metrik v §2.2:
#                  zraneni                — počet zranění vlastníka (injury_added)
#                  kolaps                 — vlastník padl, true/false (character_down)
#                  doruceno               — run skončil DORUČENO, true/false (run_ended)
#                  ztracene_bedny         — počet ztracených beden (crate_lost)
#                  ztracene_bedny_vlastni — počet beden ztracených v důsledku hodů
#                                           a riderů vlastníka (crate_lost s atribucí postavy)
#                  tag_prvni_karty        — tag první zahrané karty vlastníka (card_played)
#                  pocet_tag.<tag>        — kolik karet daného tagu vlastník zahrál
#                  max_sila_karty         — nejvyšší síla karty zahrané vlastníkem
#                                           DOBROVOLNĚ (card_played; nepočítají se
#                                           zoufalé karty ani karty vynucené
#                                           prokletou, např. Zbrklostí)
#                  zar_prah               — nejvyšší dosažený práh Žáru (heat_threshold);
#                                           hodnoty prahů dle prototyp-mvp.md, sem nehardcodovat
#                Zápis: `metrika operátor hodnota`, spojení přes `a`/`nebo`
#                (např. "zraneni >= 3 a doruceno"). Přesnou sadu predikátů uzavře
#                engine; sem patří jen podmínky ověřitelné z logu výše.
#   body:        1–3 podle obtížnosti
# Cílový počet pro MVP: 8.

cile:
  - id: mozek-operace
    text: "Polda tě v protokolu označí za mozek celé operace."
    overeni: "Protokol obsahuje formulaci připisující ti plán nebo velení."
    overeni_typ: textovy
    body: 3

  - id: nohy-na-ramena
    text: "Ať se v protokolu píše, žes při první šlamastyce vzal do zaječích."
    overeni: "Vlastníkova první zahraná karta má tag útěk."
    overeni_typ: mechanicky
    podminka: "tag_prvni_karty == utek"
    body: 1

  - id: samou-modrinu
    text: "Do New Yorku dorazíš samá modřina, ale bednu nepustíš."
    overeni: "Vlastník utržil aspoň 3 zranění a run skončil DORUČENO."
    overeni_typ: mechanicky
    podminka: "zraneni >= 3 a doruceno"
    body: 2

  - id: cisty-stit
    text: "V protokolu ať nepadne jediná zmínka, že jsi někoho udeřil."
    overeni: "Vlastník nezahrál během runu žádnou kartu s tagem Násilí."
    overeni_typ: mechanicky
    podminka: "pocet_tag.nasili == 0"
    body: 2

  - id: kupecke-slovo
    text: "Kupecké slovo platí: co ti svěřili, dovezeš. Ani jedna bedna nesmí padnout tvou rukou."
    overeni: "Run skončil DORUČENO a vlastníkovými hody ani ridery se neztratila žádná bedna."
    overeni_typ: mechanicky
    podminka: "ztracene_bedny_vlastni == 0 a doruceno"
    body: 2

  - id: frajer-v-klidu
    text: "Ať to vypadá, žes celou cestu prostál v klidu — nanejvýš škrábnutí, ať se dělo cokoli."
    overeni: "Vlastník dokončil run s nejvýše jedním zraněním a náklad dorazil."
    overeni_typ: mechanicky
    podminka: "zraneni <= 1 a doruceno"
    body: 3

  - id: obetni-beranek
    text: "Ať z protokolu vyjde, že tě do toho ostatní jen zatáhli — tys nic velkého neproved."
    overeni: "Vlastník dobrovolně nezahrál kartu se silou vyšší než 2 (zoufalé a vynucené se nepočítají)."
    overeni_typ: mechanicky
    podminka: "max_sila_karty <= 2"
    body: 2

  - id: prsty-ve-vsem
    text: "Ať protokol ukáže, že jsi měl prsty ve všem — pěst, lest, úplatek i útěk."
    overeni: "Vlastník zahrál během runu aspoň jednu kartu od každého ze čtyř tagů."
    overeni_typ: mechanicky
    podminka: "pocet_tag.nasili >= 1 a pocet_tag.lest >= 1 a pocet_tag.uplatek >= 1 a pocet_tag.utek >= 1"
    body: 3
